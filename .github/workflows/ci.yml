name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DMap/DMap.csproj

      - name: Build
        run: dotnet build DMap/DMap.csproj --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format DMap/DMap.csproj --verify-no-changes --no-restore
